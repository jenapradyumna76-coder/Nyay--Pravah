<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYAY PRAVAH | Lawyer Profile</title>
    <link rel="stylesheet" href="../styles/lawyer-style.css">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/layout.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-layout {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        }

        .profile-photo {
            width: 11rem;
            height: 11rem;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid rgba(33, 96, 172, 0.3);
            margin-bottom: 0.8rem;
        }

        .profile-label {
            font-weight: 700;
            color: #10315c;
            margin-right: 0.4rem;
        }
    </style>
</head>

<body>

    <div class="sidebar-hover-zone" aria-hidden="true"></div>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="../asset/logo/mainlogo.jpeg" alt="Nav Pravah Logo" class="sidebar-logo-img">
            <span class="sidebar-logo-text">NYAY PRAVAH</span>
        </div>
        <nav class="menu">
            <a href="lawyer-dashboard.html"><i class="fas fa-folder"></i> My Cases</a>
            <a href="lawyer-manual-review.html"><i class="fas fa-file-signature"></i> Manual Review Request</a>
            <a href="lawyer-all-cases.html"><i class="fas fa-file-upload"></i> All Cases</a>
            <a href="lawyer-pending-cases.html"><i class="fas fa-calendar-alt"></i> Pending Cases</a>
            <a href="lawyer-detail-missing-cases.html"><i class="fas fa-file-excel"></i> Detail Missing Cases</a>
            <a href="lawyer-adjoinment-cases.html"><i class="fas fa-check-double"></i> Adjoinment Cases</a>
            <a href="lawyer-analytics.html"><i class="fas fa-chart-line"></i> Analytics</a>
            <a href="lawyer-profile.html" class="active"><i class="fas fa-user-circle"></i> Profile</a>
            <a href="index.html" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
        <div class="user-profile">
            <div class="avatar">LC</div>
            <div class="info"><strong>Lead Counsel</strong><span>District Bar</span></div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-box">
                <i class="fas fa-id-badge"></i>
                <input type="text" value="Lawyer Profile" readonly>
            </div>
            <div class="header-actions">
                <button class="refresh-btn" onclick="window.location.href='lawyer-dashboard.html'">
                    <i class="fas fa-arrow-left"></i> Back To Dashboard
                </button>
            </div>
        </header>

        <section class="reports-wrapper">
            <article class="report-section">
                <h3>Profile Details</h3>
                <div class="profile-layout">
                    <div class="report-card">
                        <img id="profile-photo" class="profile-photo" src="../asset/logo/mainlogo.jpeg"
                            alt="Lawyer Photo">
                        <div class="report-card-title" id="profile-name">Lead Counsel</div>
                        <div class="report-card-meta"><span class="profile-label">Role:</span><span
                                id="profile-role">Defense/Prosecution Counsel</span></div>
                        <div class="report-card-meta"><span class="profile-label">Email:</span><span
                                id="profile-email">-</span></div>
                        <div class="report-card-meta"><span class="profile-label">Contact:</span><span
                                id="profile-contact">-</span></div>
                    </div>

                    <div class="report-card">
                        <div class="report-card-title">Description</div>
                        <div class="report-card-meta" id="profile-description-text">No description added yet.</div>
                    </div>
                </div>
            </article>
        </section>
    </main>

    <script src="../scripts/profile.js"></script>

    <script>
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                window.location.href = 'index.html';
            });
        }
    </script>
</body>

</html>
