<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawyer Verification - NYAY Pravah</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* INLINE CSS START */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #eaf5ff 0%, #f7fbff 55%, #ffffff 100%);
            color: #102446;
        }

        .tagsection {
            background-color: #020912;
            min-height: 3.25rem;
            border-radius: 0 0 8px 8px;
            display: flex;
            align-items: center;
            padding: 0.55rem 1rem;
            gap: 0.8rem;
        }

        #tag, .tag-brand {
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 800;
            min-width: 8.4rem;
        }

        #tagline, .tagline-wrap {
            border-left: 2px solid #ffffff;
            padding-left: 0.8rem;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
        }

        .auth-shell {
            width: 100%;
            padding: 2.2rem 1rem 2.8rem;
            display: flex;
            justify-content: center;
        }

        .auth-card {
            width: min(100%, 540px);
            background: #ffffff;
            border: 1px solid rgba(33, 96, 172, 0.2);
            border-radius: 20px;
            padding: 1.35rem;
            box-shadow: 0 16px 34px rgba(18, 63, 112, 0.15);
        }

        .register-card {
            width: min(100%, 640px);
        }

        .auth-title {
            font-size: 1.85rem;
            color: #0f2b52;
            margin-bottom: 0.45rem;
        }

        .auth-subtitle {
            font-size: 0.98rem;
            line-height: 1.65;
            color: #375174;
            margin-bottom: 1.15rem;
        }

        .verification-form {
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
        }

        .auth-label {
            font-size: 0.92rem;
            font-weight: 600;
            color: #1b3f6d;
        }

        .auth-input {
            width: 100%;
            border: 1px solid rgba(49, 108, 180, 0.32);
            border-radius: 12px;
            height: 2.95rem;
            padding: 0 0.85rem;
            font-size: 0.97rem;
            outline: none;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            margin-bottom: 0.6rem;
        }

        .auth-input:focus {
            border-color: #2d7ddd;
            box-shadow: 0 0 0 4px rgba(45, 125, 221, 0.16);
        }

        .auth-submit {
            border: none;
            border-radius: 14px;
            height: 3rem;
            font-size: 1rem;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.25s ease;
            margin-top: 0.15rem;
        }

        .lawyer-theme {
            background: linear-gradient(135deg, #2197ec 0%, #157ad8 100%);
            box-shadow: 0 10px 20px rgba(21, 122, 216, 0.28);
        }

        .verify-license-btn {
            background: #ffffff !important;
            color: #1a4a82 !important;
            border: 1px solid rgba(34, 104, 179, 0.4) !important;
            box-shadow: none !important;
        }

        .flow-actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.6rem;
            margin-top: 0.6rem;
        }

        .secondary-btn {
            height: 2.7rem;
            border-radius: 12px;
            border: 1px solid rgba(34, 104, 179, 0.4);
            background: #ffffff;
            color: #1a4a82;
            font-size: 0.94rem;
            font-weight: 600;
            cursor: pointer;
        }

        .np-footer {
            width: 100%;
            background: #ffffff;
            margin-top: 4rem;
        }

        .footer-primary-links {
            background-color: #1a1c4d;
            color: #e0e0e0;
            padding: 4rem 8%;
        }

        .footer-grid {
            display: flex;
            justify-content: space-between;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .footer-col ul {
            list-style: none;
        }

        .footer-col a {
            color: #b0b0b0;
            text-decoration: none;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .footer-secondary-info {
            background: #f8f9fa;
            text-align: center;
            padding: 1.5rem 0;
        }

        .mherm-badge {
            background-color: #57b9ff;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        @media (min-width: 760px) {
            .flow-actions {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>

<body>
    <main>
        <div class="tagsection">
            <div id="tag">
                <p>NYAY PRAVHA</p>
            </div>
            <div id="tagline">
                <p>न्याय का प्रवाह</p>
            </div>
        </div>

        <section class="auth-shell">
            <div class="auth-card register-card">
                <h1 class="auth-title">Lawyer New User Verification</h1>
                <p class="auth-subtitle">Complete your profile to continue with license verification.</p>

                <form id="registrationForm" class="verification-form">
                    <label class="auth-label" for="lawyer-full-name">Name as per Aadhar / Govt Proof</label>
                    <input class="auth-input" id="lawyer-full-name" type="text" required>

                    <label class="auth-label" for="lawyer-email">Gmail</label>
                    <input class="auth-input" id="lawyer-email" type="email" placeholder="name@gmail.com" required>

                    <label class="auth-label" for="lawyer-password">Password</label>
                    <input class="auth-input" id="lawyer-password" type="password" required>

                    <label class="auth-label" for="lawyer-confirm-password">Confirm Password</label>
                    <input class="auth-input" id="lawyer-confirm-password" type="password" required>

                    <label class="auth-label" for="lawyer-license-no">Enter Your Licence No</label>
                    <input class="auth-input" id="lawyer-license-no" type="text" required>

                    <button id="verifyBtn" class="auth-submit lawyer-theme verify-license-btn" type="submit">Verify Your Licence To Continue</button>

                    <div class="flow-actions">
                        <button id="backHome" class="secondary-btn" type="button">Back To Home</button>
                        <button id="backPrev" class="secondary-btn" type="button">Back To Previous</button>
                    </div>
                </form>
            </div>
        </section>

        <footer class="np-footer">
            <div class="footer-primary-links">
                <div class="footer-grid">
                    <div class="footer-col">
                        <ul>
                            <li><a href="#">AI Case Search</a></li>
                            <li><a href="#">FAQ / User Guides</a></li>
                        </ul>
                    </div>
                    <div class="footer-col">
                        <div class="app-card">
                            <p>NAV PRAVAH</p>
                            <span class="mherm-badge">MHERM '26</span>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </main>

</html>
