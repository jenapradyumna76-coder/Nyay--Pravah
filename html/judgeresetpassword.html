<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - NYAYA Pravah</title>
    <link rel="stylesheet" href="./judgeresetpassword.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <main>
        <div class="tagsection">
            <div id="tag">
                <p>NAV PRAVHA</p>
            </div>
            <div id="tagline">
                <p>&#2344;&#2381;&#2351;&#2366;&#2351; &#2325;&#2366; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;</p>
            </div>
        </div>

        <section class="auth-shell">
            <div class="auth-card">
                <h1 class="auth-title">Reset Password</h1>
                <p class="auth-subtitle">Set a new password for your judge account.</p>

                <form id="resetPasswordForm" class="login-form">
                    <label for="new-password" class="auth-label">New Password</label>
                    <input id="new-password" type="password" class="auth-input" placeholder="Enter new password"
                        minlength="8" required>

                    <label for="confirm-new-password" class="auth-label">Confirm New Password</label>
                    <input id="confirm-new-password" type="password" class="auth-input" placeholder="Re-enter new password"
                        minlength="8" required>

                    <button id="updatePasswordBtn" type="submit" class="auth-submit judge-theme">Update Password</button>
                    <button id="backToLoginBtn" type="button" class="secondary-btn">Back To Login</button>
                </form>
            </div>
        </section>
    </main>

    <script>
        const SUPABASE_URL = 'https://hwvflwartrxmazzjypbp.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_aHsV710290uB_VKb-mcSvg_b0IO3aEO';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const resetPasswordForm = document.getElementById('resetPasswordForm');
        const newPasswordInput = document.getElementById('new-password');
        const confirmNewPasswordInput = document.getElementById('confirm-new-password');
        const updatePasswordBtn = document.getElementById('updatePasswordBtn');
        const backToLoginBtn = document.getElementById('backToLoginBtn');

        function hasRecoveryContext() {
            const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
            const queryParams = new URLSearchParams(window.location.search);
            return hashParams.get('type') === 'recovery' || queryParams.get('type') === 'recovery' || queryParams.has('code');
        }

        if (!hasRecoveryContext()) {
            alert('Open this page from your password reset email link.');
        }

        resetPasswordForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const newPassword = newPasswordInput.value;
            const confirmNewPassword = confirmNewPasswordInput.value;

            if (!newPassword || !confirmNewPassword) {
                alert('Please fill both password fields.');
                return;
            }

            if (newPassword.length < 8) {
                alert('Password must be at least 8 characters long.');
                return;
            }

            if (newPassword !== confirmNewPassword) {
                alert('Passwords do not match.');
                return;
            }

            updatePasswordBtn.disabled = true;
            updatePasswordBtn.innerText = 'Updating...';

            try {
                const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

                if (error) {
                    throw error;
                }

                await supabaseClient.auth.signOut();
                alert('Password updated successfully. Please sign in with your new password.');
                window.location.href = './judgelogin.html';
            } catch (err) {
                alert('Update Password Error: ' + err.message);
                console.error(err);
            } finally {
                updatePasswordBtn.disabled = false;
                updatePasswordBtn.innerText = 'Update Password';
            }
        });

        backToLoginBtn.addEventListener('click', () => {
            window.location.href = './judgelogin.html';
        });
    </script>
</body>

</html>
